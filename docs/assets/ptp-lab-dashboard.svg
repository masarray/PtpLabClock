      <rect x="236" y="344" width="200" height="102" rx="18" fill="#f2f7fd"/><text x="254" y="370" font-size="12" fill="#64748b">WIRESHARK</text><text x="254" y="396" font-size="14" fill="#102033">eth.type ==</text><text x="254" y="420" font-size="18" font-weight="700" fill="#102033">0x88f7 / ptp</text>
