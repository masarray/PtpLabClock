      <text x="85" y="30" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" font-weight="500" fill="white">Apache-2.0</text>
      <rect x="186" width="170" height="46" rx="23" fill="rgba(22,104,232,0.08)" stroke="rgba(22,104,232,0.14)"/>
      <text x="271" y="30" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" font-weight="500" fill="#155bbd">Windows lab</text>
      <rect x="372" width="170" height="46" rx="23" fill="rgba(15,147,133,0.09)" stroke="rgba(15,147,133,0.14)"/>
      <text x="457" y="30" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" font-weight="500" fill="#0f6b5f">PTP monitor</text>
